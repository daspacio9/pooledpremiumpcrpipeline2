# configuration of display in snakemake workflow catalog: https://snakemake.github.io/snakemake-workflow-catalog

usage:
  mandatory-flags:
    desc: "flags that must be used when running the pipeline, e.g. --use-conda, --cores, --snakefile"
    flags: ["--use-conda", "--cores", "--snakefile"]
    conda: true # whether pipeline works with '--sdm conda'
    apptainer: false # whether pipeline works with '--sdm apptainer/singularity'
    apptainer+conda: false # whether pipeline works with '--sdm conda apptainer/singularity'
    report: false # whether creation of reports using 'snakemake --report report.zip' is supported
